services:
  tv-lite:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - dotenv
      args:
        VITE_PRESETS: ${VITE_PRESETS}
        VITE_RIGHT_PAD_BARS: ${VITE_RIGHT_PAD_BARS}
        VITE_PRESET_ROTATION_ENABLED: ${VITE_PRESET_ROTATION_ENABLED}
        VITE_PRESET_ROTATION_INTERVAL: ${VITE_PRESET_ROTATION_INTERVAL}
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped

secrets:
  dotenv:
    file: .env
